<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Karte - 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d9373;
      --primary-light: #e6f5f0;
      --primary-dark: #087a60;
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-hover: #f8f9fa;
      --border: #e2e5e9;
      --text: #1a1d21;
      --text-secondary: #5f6670;
      --text-muted: #9ea4ad;
      --accent-blue: #2563eb;
      --accent-blue-bg: #eff4ff;
      --accent-amber: #d97706;
      --accent-amber-bg: #fef9ee;
      --accent-red: #dc2626;
      --accent-red-bg: #fef2f2;
      --accent-green: #16a34a;
      --accent-green-bg: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
      --radius: 10px;
      --radius-lg: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LOGIN ===== */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #064e3b 0%, #0d9373 50%, #065f46 100%);
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      top: -200px; right: -100px;
    }
    .login-container::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      bottom: -100px; left: -50px;
    }
    .login-card {
      background: var(--surface);
      padding: 44px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-icon {
      margin-bottom: 16px;
      line-height: 0;
    }
    .login-logo h1 { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 3px; }
    .login-logo p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,147,115,0.12); }
    .login-btn {
      width: 100%; padding: 13px;
      background: var(--primary);
      color: white; border: none;
      border-radius: 8px; font-size: 15px;
      font-weight: 600; cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-btn:active { transform: scale(0.98); }
    .login-error {
      background: var(--accent-red-bg);
      color: var(--accent-red);
      padding: 11px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 13px;
      display: none;
      border: 1px solid #fecaca;
    }
    .login-hint { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted); }

    /* ===== LAYOUT ===== */
    .dashboard { display: none; }
    .dashboard.active { display: flex; flex-direction: column; min-height: 100vh; }
    .login-container.hidden { display: none; }

    .header {
      background: var(--surface);
      padding: 0 24px;
      height: 60px;
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-logo {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 20px; font-weight: 800; color: var(--primary);
      display: flex; align-items: center; gap: 12px;
      letter-spacing: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-org { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .logout-btn {
      padding: 7px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: inherit;
      transition: all 0.15s;
    }
    .logout-btn:hover { background: var(--border); }

    .layout { display: flex; flex: 1; }

    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      position: sticky; top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .sidebar-section { padding: 0 12px; margin-bottom: 6px; }
    .sidebar-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px 4px; letter-spacing: 0.8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: 7px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .main-content { flex: 1; padding: 24px; min-width: 0; }

    /* ===== COMPONENTS ===== */
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .page-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px; letter-spacing: -0.3px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .stat-card {
      background: var(--surface);
      padding: 18px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: var(--shadow-md); }
    .stat-card-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
    .stat-card-value { font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .stat-change-up { color: var(--accent-green); }
    .stat-change-down { color: var(--accent-red); }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card + .card { margin-top: 16px; }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header h2 { font-size: 14px; font-weight: 600; color: var(--text); }
    .card-actions { display: flex; gap: 6px; }

    .filter-bar {
      background: var(--surface);
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 130px; }
    .filter-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-group input, .filter-group select {
      width: 100%; padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 6px; font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--primary); }

    .btn {
      padding: 8px 16px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-ghost { background: var(--primary-light); color: var(--primary); }
    .btn-ghost:hover { background: #cceee4; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg); }
    th {
      padding: 10px 16px; text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 13.5px;
      color: var(--text);
    }
    tr:hover td { background: var(--surface-hover); }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11.5px;
      font-weight: 600;
    }
    .badge-nurse { background: var(--accent-blue-bg); color: var(--accent-blue); }
    .badge-rehab { background: var(--accent-amber-bg); color: var(--accent-amber); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 12px; display: block; }

    /* Loading */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-muted); font-size: 14px; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 18px;
      width: 100%; max-width: 680px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
      border-radius: 18px 18px 0 0;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      border: none; background: var(--bg);
      border-radius: 8px; cursor: pointer;
      font-size: 18px; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 24px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .detail-item label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
    .detail-item .val { font-size: 14px; color: var(--text); font-weight: 500; }
    .detail-record {
      background: var(--bg); padding: 16px 18px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      line-height: 1.75; font-size: 13.5px;
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Settings */
    .settings-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      padding: 22px 24px;
    }
    .settings-card + .settings-card { margin-top: 16px; }
    .settings-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .settings-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
    .settings-row + .settings-row { margin-top: 14px; }
    .settings-field { flex: 1; min-width: 180px; }
    .settings-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .settings-field input {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 6px; font-size: 14px;
      font-family: inherit;
    }
    .settings-field input:focus { outline: none; border-color: var(--primary); }
    .gas-url-display {
      background: var(--bg);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
      border: 1px solid var(--border);
      font-family: 'DM Sans', monospace;
    }

    /* Report detail */
    .report-content {
      background: var(--bg);
      padding: 16px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 13.5px;
      margin-top: 8px;
    }
    .report-section { margin-bottom: 16px; }
    .report-section-label {
      font-size: 12px; font-weight: 700; color: var(--primary);
      margin-bottom: 6px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text); color: white;
      padding: 12px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      animation: toastIn 0.3s ease;
      display: none;
    }
    .toast.show { display: block; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Progress bar */
    .progress-bar-bg {
      width: 100%; height: 22px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
      transition: width 0.4s ease;
      min-width: 0;
    }
    .progress-bar-fill.in-hours { background: var(--primary); }
    .progress-bar-fill.out-hours { background: var(--accent-amber); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .filter-row { flex-direction: column; }
      .filter-group { min-width: 100%; }
      .detail-grid { grid-template-columns: 1fr; }
      .header { padding: 0 16px; }
      .settings-row { flex-direction: column; }
    }
  </style>
</head>

<script>
// ============================================
// CONFIG
// ============================================
const STORAGE_KEY = 'nursing_admin_config';
const DEFAULT_CONFIG = {
  gasUrl: '',
  adminId: 'admin',
  adminPassword: 'demo1234',
  orgName: '訪問看護ステーション',
  bizStartHour: 9,
  bizStartMinute: 0,
  bizEndHour: 18,
  bizEndMinute: 0
};

let APP_CONFIG = loadConfig();
let cachedRecordsData = null;
let cachedReportsData = null;

function loadConfig() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? { ...DEFAULT_CONFIG, ...JSON.parse(saved) } : { ...DEFAULT_CONFIG };
  } catch { return { ...DEFAULT_CONFIG }; }
}

function saveConfig() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_CONFIG));
}

// ============================================
// API
// ============================================
async function callAPI(action, params = {}) {
  if (!APP_CONFIG.gasUrl) {
    throw new Error('GAS URLが設定されていません。設定画面からURLを入力してください。');
  }
  const body = { action, ...params };
  const res = await fetch(APP_CONFIG.gasUrl, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  // GAS returns text/plain for JSONP, parse manually
  const text = await res.text();
  const data = JSON.parse(text);
  if (!data.success) throw new Error(data.message || 'API Error');
  return data.data;
}

// ============================================
// AUTH
// ============================================
function handleLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPassword').value;

  if (id === APP_CONFIG.adminId && pw === APP_CONFIG.adminPassword) {
    localStorage.setItem('nursing_admin_logged_in', 'true');
    document.getElementById('loginContainer').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('headerOrgName').textContent = APP_CONFIG.orgName;
    document.getElementById('loginError').style.display = 'none';
    loadDashboard();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function handleLogout() {
  localStorage.removeItem('nursing_admin_logged_in');
  document.getElementById('loginContainer').classList.remove('hidden');
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginId').value = '';
  document.getElementById('loginPassword').value = '';
}

// 起動時にログイン状態を復元
(function autoLogin() {
  if (localStorage.getItem('nursing_admin_logged_in') === 'true') {
    document.getElementById('loginContainer').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('headerOrgName').textContent = APP_CONFIG.orgName;
    loadDashboard();
  }
})();

document.addEventListener('keypress', e => {
  if (e.key === 'Enter' && !document.getElementById('loginContainer').classList.contains('hidden')) {
    handleLogin();
  }
});

// ============================================
// NAVIGATION
// ============================================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === pageId);
  });

  // Lazy load
  if (pageId === 'dashboard-page') loadDashboard();
  else if (pageId === 'records-page') loadRecords();
  else if (pageId === 'users-page') loadUsers();
  else if (pageId === 'staff-page') loadStaff();
  else if (pageId === 'reports-page') loadReports();
  else if (pageId === 'settings-page') loadSettings();
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => showPage(btn.dataset.page));
});

async function loadRecords() {
  const container = document.getElementById('recordsTable');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  try {
    const params = {
      startDate: document.getElementById('filterStartDate').value?.replace(/-/g, '/') || '',
      endDate: document.getElementById('filterEndDate').value?.replace(/-/g, '/') || '',
      patient: document.getElementById('filterPatient').value,
      jobType: document.getElementById('filterJobType').value,
      recorder: document.getElementById('filterRecorder').value

    const data = await callAPI('admin_records', params);
    cachedRecordsData = data;

    document.getElementById('recordsCount').textContent = `検索結果: ${data.total}件`;

    // Populate filter dropdowns
    populateSelect('filterPatient', data.patients, params.patient);
    populateSelect('filterRecorder', data.recorders, params.recorder);

    if (data.records.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="empty-state-icon">📝</span>該当する記録がありません</div>';

        <td>${esc(r.patient)}</td>
        <td><span class="badge ${r.jobType === 'リハビリ職' ? 'badge-rehab' : 'badge-nurse'}">${esc(r.jobType)}</span></td>
        <td>${esc(r.recorder)}</td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text-secondary);">${esc(r.recordPreview)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openRecordDetail(${r.rowIndex})">詳細</button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span>${esc(err.message)}</div>`;
  }

function resetFilters() {
  const now = new Date();
  document.getElementById('filterStartDate').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  document.getElementById('filterEndDate').value = now.toISOString().split('T')[0];
  document.getElementById('filterPatient').value = '';
  document.getElementById('filterJobType').value = '';
  document.getElementById('filterRecorder').value = '';
  loadRecords();
}

function populateSelect(id, items, currentValue) {
  const el = document.getElementById(id);
  const opts = ['<option value="">すべて</option>'];
  (items || []).forEach(item => {
    opts.push(`<option value="${esc(item)}" ${item === currentValue ? 'selected' : ''}>${esc(item)}</option>`);
  });
  el.innerHTML = opts.join('');
}

function exportCSV() {
  if (!cachedRecordsData || !cachedRecordsData.records.length) {
    showToast('エクスポートするデータがありません');
    return;
  }
  const rows = [['訪問日', '利用者', '職種', '記録者'].join(',')];
  cachedRecordsData.records.forEach(r => {
    rows.push([r.date, r.patient, r.jobType, r.recorder].map(v => `"${v}"`).join(','));
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `記録一覧_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('CSVをダウンロードしました');
}

async function loadStaff() {

  try {
    const data = await callAPI('admin_staff');

    // 職種別にグループ化

    const rehabs = data.staff.filter(s => s.jobType === 'リハビリ職');
    const others = data.staff.filter(s => s.jobType !== '看護師' && s.jobType !== 'リハビリ職');

    document.getElementById('staffCount').textContent = `登録スタッフ: ${data.staff.length}名（看護師${nurses.length} / リハ${rehabs.length}${others.length ? ' / 他' + others.length : ''}）`;

      const totalVisits = list.reduce((s, v) => s + v.monthlyCount, 0);
      return `
        <div style="margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:0 4px;">
            <span class="badge ${badge}" style="font-size:12px;">${esc(title)}</span>
            <span style="font-size:13px;color:var(--text-secondary);">${list.length}名 / 今月合計 ${totalVisits}件</span>
          </div>
          <table>
            <thead><tr><th>名前</th><th style="text-align:center;">訪問件数（今月）</th></tr></thead>
            <tbody>${list.sort((a, b) => b.monthlyCount - a.monthlyCount).map(s => `<tr>
              <td style="font-weight:500;">${esc(s.name)}</td>
              <td style="text-align:center;">${s.monthlyCount}件</td>
            </tr>`).join('')}</tbody>
          </table>

      staffGroupHTML('看護師', 'badge-nurse', nurses) +

    container.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span>${esc(err.message)}</div>`;

// ============================================
// REPORTS (generate + dual filter + edit + save)
// ============================================
let generatePollTimer = null;

// Set default month to last month
(function initReportMonth() {
  const now = new Date();
  const last = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const y = last.getFullYear();
  const m = String(last.getMonth() + 1).padStart(2, '0');
  setTimeout(() => {
    const el = document.getElementById('reportTargetMonth');
    if (el) el.value = `${y}-${m}`;
  }, 100);
})();

async function startGenerateReports() {
  const monthInput = document.getElementById('reportTargetMonth').value;
  if (!monthInput) { showToast('対象月を選択してください'); return; }
  
  const [y, m] = monthInput.split('-');
  const targetMonth = y + '/' + m;
  
  if (!confirm(`${y}年${parseInt(m)}月の報告書を生成しますか？\n（既存の同月データは上書きされます）`)) return;
  
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('btnGenerate').textContent = '生成中...';
  document.getElementById('generateProgress').style.display = 'block';
  document.getElementById('generateProgressText').textContent = '生成を開始しています...';
  document.getElementById('generateProgressBar').style.width = '0%';
  
  try {
    const res = await callAPI('admin_generate_reports', { targetMonth });
    showToast(res.message + '（' + res.totalCount + '名）');
    // ポーリング開始
    generatePollTimer = setInterval(pollGenerateStatus, 5000);
  } catch (err) {
    showToast('エラー: ' + err.message);
    resetGenerateUI();
  }
}

async function pollGenerateStatus() {
  try {
    const res = await callAPI('admin_generate_status');
    const pct = res.percent || 0;
    document.getElementById('generateProgressBar').style.width = pct + '%';
    document.getElementById('generateProgressText').textContent = 
      `生成中... ${res.currentIndex}/${res.totalCount}名 (${pct}%) — 経過${res.elapsedMinutes}分`;
    
    if (!res.processing) {
      clearInterval(generatePollTimer);
      generatePollTimer = null;
      document.getElementById('generateProgressText').textContent = '✅ 生成完了！';
      resetGenerateUI();
      // 報告書を再読み込み
      setTimeout(() => loadReports(), 500);
    }
  } catch (err) {
    clearInterval(generatePollTimer);
    generatePollTimer = null;
    resetGenerateUI();
  }
}

function resetGenerateUI() {
  document.getElementById('btnGenerate').disabled = false;
  document.getElementById('btnGenerate').textContent = '生成開始';
  setTimeout(() => { document.getElementById('generateProgress').style.display = 'none'; }, 3000);
}

async function loadReports() {
  const container = document.getElementById('reportsContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

  try {
    const data = await callAPI('admin_reports');
    cachedReportsData = data;

    // フィルター選択肢を構築
    const recorders = new Set();
    const patients = new Set();
    if (data.reports) {
      data.reports.forEach(report => {
        (report.entries || []).forEach(e => {
          if (e.recorder) recorders.add(e.recorder);
          if (e.patient) patients.add(e.patient);
        });
      });
    }
    
    const recSelect = document.getElementById('reportFilterRecorder');
    const curRec = recSelect.value;
    recSelect.innerHTML = '<option value="">全スタッフ</option>' +
      [...recorders].sort().map(r => `<option value="${esc(r)}" ${r === curRec ? 'selected' : ''}>${esc(r)}</option>`).join('');

    const patSelect = document.getElementById('reportFilterPatient');
    const curPat = patSelect.value;
    patSelect.innerHTML = '<option value="">全利用者</option>' +
      [...patients].sort().map(p => `<option value="${esc(p)}" ${p === curPat ? 'selected' : ''}>${esc(p)}</option>`).join('');

    renderReports(data, curRec, curPat);
  } catch (err) {
    container.innerHTML = `<div class="card"><div class="empty-state"><span class="empty-state-icon">⚠️</span>${esc(err.message)}</div></div>`;
  }
}

function filterReports() {
  if (!cachedReportsData) return;
  const recorder = document.getElementById('reportFilterRecorder').value;
  const patient = document.getElementById('reportFilterPatient').value;
  renderReports(cachedReportsData, recorder, patient);
}

function resetReportFilters() {
  document.getElementById('reportFilterRecorder').value = '';
  document.getElementById('reportFilterPatient').value = '';
  filterReports();
}

function renderReports(data, filterRecorder, filterPatient) {
  const container = document.getElementById('reportsContainer');

  if (!data.reports || data.reports.length === 0) {
    container.innerHTML = '<div class="card"><div class="empty-state"><span class="empty-state-icon">📊</span>生成済みの報告書がありません<br><small>上の「報告書を生成」から対象月を指定して生成してください</small></div></div>';
    return;
  }

  let html = '';

  data.reports.forEach(report => {
    let entries = report.entries || [];
    if (filterRecorder) entries = entries.filter(e => e.recorder === filterRecorder);
    if (filterPatient) entries = entries.filter(e => e.patient === filterPatient);
    if (entries.length === 0) return;

    const filterLabels = [];
    if (filterRecorder) filterLabels.push(filterRecorder + '担当');
    if (filterPatient) filterLabels.push(filterPatient);
    const countLabel = filterLabels.length > 0
      ? `${esc(report.period)}（${entries.length}名 / ${filterLabels.join('・')}）`
      : `${esc(report.period)}（${report.userCount}名）`;

    html += `
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <h2>${countLabel}</h2>
          <button class="btn btn-secondary btn-sm" onclick="copyAllReports('${escJs(report.period)}', '${escJs(filterRecorder || '')}', '${escJs(filterPatient || '')}')">📋 一括コピー</button>
        </div>
        <table>
          <thead><tr><th>利用者</th><th>回数</th><th>経過</th><th>リハ</th><th>操作</th></tr></thead>
          <tbody>${entries.map(e => `<tr>
            <td style="font-weight:500;">${esc(e.patient)}</td>
            <td>${e.visitCount}回</td>
            <td>${e.hasProgress ? '✅' : '—'}</td>
            <td>${e.hasRehab ? '✅' : '—'}</td>
            <td style="white-space:nowrap;">
              ${e.hasProgress ? `<button class="btn btn-ghost btn-sm" onclick="openEditReport('${escJs(e.patient)}', '${escJs(report.sheetName)}', '${escJs(report.period)}', 'progress', \`${escJs(e.progress)}\`)">✏️ 経過</button>` : ''}
              ${e.hasRehab ? `<button class="btn btn-ghost btn-sm" onclick="openEditReport('${escJs(e.patient)}', '${escJs(report.sheetName)}', '${escJs(report.period)}', 'rehabAddendum', \`${escJs(e.rehabAddendum)}\`)">✏️ リハ</button>` : ''}
              <button class="btn btn-secondary btn-sm" onclick="copyReportText('${escJs(e.patient)}', \`${escJs(e.progress)}\`, \`${escJs(e.rehabAddendum)}\`)">コピー</button>
            </td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    `;
  });

  if (!html) {
    html = '<div class="card"><div class="empty-state"><span class="empty-state-icon">🔍</span>該当する報告書がありません</div></div>';
  }

  container.innerHTML = html;
}

function openEditReport(patient, sheetName, period, field, content) {
  const fieldLabel = field === 'progress' ? '病状の経過' : 'リハビリ別添';
  document.getElementById('modalTitle').textContent = `${patient} - ${fieldLabel}（${period}）`;
  document.getElementById('modalBody').innerHTML = `
    <textarea id="editReportText" style="width:100%;min-height:250px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.7;font-family:'Noto Sans JP',sans-serif;resize:vertical;">${esc(content)}</textarea>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-secondary btn-sm" onclick="copyText(document.getElementById('editReportText').value)">📋 コピー</button>
      <button class="btn btn-primary btn-sm" onclick="saveReport('${escJs(patient)}', '${escJs(sheetName)}', '${escJs(field)}')">💾 保存</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

async function saveReport(patient, sheetName, field) {
  const value = document.getElementById('editReportText').value;
  try {
    const res = await callAPI('admin_update_report', { sheetName, patient, field, value });
    showToast(res.message || '保存しました');
    closeModal();
    // キャッシュも更新
    if (cachedReportsData && cachedReportsData.reports) {
      cachedReportsData.reports.forEach(report => {
        if (report.sheetName === sheetName) {
          report.entries.forEach(e => {
            if (e.patient === patient) {
              if (field === 'progress') { e.progress = value; e.hasProgress = !!value.trim(); }
              if (field === 'rehabAddendum') { e.rehabAddendum = value; e.hasRehab = !!value.trim(); }
            }
          });
        }
      });
      filterReports();
    }
  } catch (err) {
    showToast('保存失敗: ' + err.message);
  }
}

function copyAllReports(period, filterRecorder, filterPatient) {
  if (!cachedReportsData) return;
  const report = cachedReportsData.reports.find(r => r.period === period);
  if (!report) return;

  let entries = report.entries || [];
  if (filterRecorder) entries = entries.filter(e => e.recorder === filterRecorder);
  if (filterPatient) entries = entries.filter(e => e.patient === filterPatient);

  const lines = [];
  entries.forEach(e => {
    lines.push('【' + e.patient + '】');
    if (e.progress) lines.push(e.progress);
    if (e.rehabAddendum) { lines.push(''); lines.push('[リハビリ別添]'); lines.push(e.rehabAddendum); }
    lines.push(''); lines.push('---'); lines.push('');
  });

  copyText(lines.join('\n'));
}

function copyReportText(patient, progress, rehab) {
  let text = '';
  if (progress) text += progress;
  if (progress && rehab) text += '\n\n---\n\n';
  if (rehab) text += rehab;
  copyText(text);
}

// ============================================
// SETTINGS
// ============================================
function loadSettings() {
  document.getElementById('settingsGasUrl').value = APP_CONFIG.gasUrl || '';
  document.getElementById('settingsAdminId').value = APP_CONFIG.adminId || 'admin';
  document.getElementById('settingsOrgName').value = APP_CONFIG.orgName || '';
  document.getElementById('settingsBizStart').value =
    String(APP_CONFIG.bizStartHour || 9).padStart(2, '0') + ':' + String(APP_CONFIG.bizStartMinute || 0).padStart(2, '0');
  document.getElementById('settingsBizEnd').value =
    String(APP_CONFIG.bizEndHour || 18).padStart(2, '0') + ':' + String(APP_CONFIG.bizEndMinute || 0).padStart(2, '0');
}

function saveSettings() {
  APP_CONFIG.gasUrl = document.getElementById('settingsGasUrl').value.trim();
  saveConfig();
  showToast('GAS URLを保存しました');
}

function saveAuthSettings() {
  const newId = document.getElementById('settingsAdminId').value.trim();
  const newPw = document.getElementById('settingsNewPassword').value;
  if (newId) APP_CONFIG.adminId = newId;
  if (newPw) APP_CONFIG.adminPassword = newPw;
  saveConfig();
  showToast('ログイン設定を保存しました');
}

function saveOrgSettings() {
  APP_CONFIG.orgName = document.getElementById('settingsOrgName').value.trim();
  saveConfig();
  document.getElementById('headerOrgName').textContent = APP_CONFIG.orgName;
  showToast('事業所情報を保存しました');
}

function saveBizHoursSettings() {
  const start = document.getElementById('settingsBizStart').value.split(':');
  const end = document.getElementById('settingsBizEnd').value.split(':');
  APP_CONFIG.bizStartHour = parseInt(start[0] || '9');
  APP_CONFIG.bizStartMinute = parseInt(start[1] || '0');
  APP_CONFIG.bizEndHour = parseInt(end[0] || '18');
  APP_CONFIG.bizEndMinute = parseInt(end[1] || '0');
  saveConfig();
  showToast('営業時間を保存しました');
}

async function testConnection() {
  const statusEl = document.getElementById('connectionStatus');
  statusEl.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">接続テスト中...</span>';
  try {
    // Save first
    APP_CONFIG.gasUrl = document.getElementById('settingsGasUrl').value.trim();
    saveConfig();
    const res = await fetch(APP_CONFIG.gasUrl);
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.success) {
      statusEl.innerHTML = '<span style="color:var(--accent-green);font-size:13px;font-weight:600;">✅ 接続成功！API is running</span>';
    } else {
      statusEl.innerHTML = '<span style="color:var(--accent-red);font-size:13px;">❌ 接続失敗: ' + (data.message || 'Unknown') + '</span>';
    }
  } catch (err) {
    statusEl.innerHTML = '<span style="color:var(--accent-red);font-size:13px;">❌ 接続失敗: ' + err.message + '</span>';
  }
}

// ============================================
// UTILITIES
// ============================================
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function escJs(str) {
  if (!str) return '';
  return String(str).replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// Init: set default date filters
(function initFilters() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('filterStartDate').value = `${y}-${m}-01`;
  document.getElementById('filterEndDate').value = now.toISOString().split('T')[0];
})();
</script>
